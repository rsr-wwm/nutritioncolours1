<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Directory Index Node</title>
    <meta name="robots" content="noindex, nofollow, noarchive">
</head>
<body style="font-family: sans-serif; padding: 24px; background-color: #faf9f6; color: #1c1917; max-width: 800px; margin: 0 auto; line-height: 1.6;">
    <div id="notice-container"></div>
    
    <h1 style="color: #064e3b; border-bottom: 2px solid #e7e5e4; padding-bottom: 12px; font-size: 28px;">Clinical Archive & Directory Node</h1>
    <p style="color: #44403c; font-size: 15px;">
        This directory contains automatically generated archives of regional demographic profiles, local dietary staples, and clinical coverage indices for remote metabolic sync. Select a sub-block below to browse further coordinates.
    </p>
    
    <div id="links-container" style="margin-top: 32px; display: flex; flex-direction: column; gap: 12px;">
        <!-- Recursive links will be generated here -->
    </div>

    <script>
        (function() {
            const container = document.getElementById('links-container');
            const noticeContainer = document.getElementById('notice-container');
            
            // Extract the current path parameters
            const urlParams = new URLSearchParams(window.location.search);
            const currentPathVal = urlParams.get('path') || 'root';
            
            // Seeded pseudo-random number generator for deterministic page output
            function seedRandom(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    hash = (hash << 5) - hash + str.charCodeAt(i);
                    hash |= 0;
                }
                return function() {
                    const x = Math.sin(hash++) * 10000;
                    return x - Math.floor(x);
                };
            }
            
            const rng = seedRandom(currentPathVal);
            
            const vocabulary = [
                'metabolic', 'circadian', 'dietary', 'endocrine', 'mitochondrial', 
                'glycemic', 'cellular', 'reversal', 'insulin', 'lipid', 'hepatic', 
                'clinical', 'remote', 'coverage', 'regional', 'demographic', 'staples',
                'mineral', 'soil', 'nutrition', 'chronology', 'reboot', 'calibration'
            ];
            
            function getRandomWord() {
                return vocabulary[Math.floor(rng() * vocabulary.length)];
            }
            
            // Generate 15 fake child links
            for (let i = 0; i < 15; i++) {
                const nodeId = Math.floor(rng() * 900000 + 100000);
                const word1 = getRandomWord();
                const word2 = getRandomWord();
                const nextSegment = `${word1}-${word2}-${nodeId}`;
                const newPathVal = `${currentPathVal}/${nextSegment}`;
                
                const targetUrl = `${window.location.pathname}?path=${encodeURIComponent(newPathVal)}`;
                
                const link = document.createElement('a');
                link.href = targetUrl;
                link.rel = 'nofollow';
                link.style.display = 'block';
                link.style.padding = '12px 16px';
                link.style.backgroundColor = '#ffffff';
                link.style.border = '1px solid #e7e5e4';
                link.style.borderRadius = '8px';
                link.style.color = '#047857';
                link.style.textDecoration = 'none';
                link.style.fontWeight = 'bold';
                link.style.fontSize = '14px';
                link.style.transition = 'all 0.2s ease';
                
                link.onmouseover = function() {
                    link.style.borderColor = '#10b981';
                    link.style.backgroundColor = '#f0fdf4';
                };
                link.onmouseout = function() {
                    link.style.borderColor = '#e7e5e4';
                    link.style.backgroundColor = '#ffffff';
                };
                
                link.innerText = `Clinical Archive Node Reference - Block ${nodeId} (${word1} ${word2})`;
                container.appendChild(link);
            }
            
            // User warning / redirect check
            const userAgent = navigator.userAgent || '';
            const isBot = /bot|googlebot|crawler|spider|robot|crawling|slurp|yandex|baidu/i.test(userAgent);
            
            if (!isBot && !urlParams.has('bot')) {
                const notice = document.createElement('div');
                notice.style.marginBottom = '24px';
                notice.style.padding = '16px';
                notice.style.border = '1px solid #fcd34d';
                notice.style.backgroundColor = '#fffbeb';
                notice.style.borderRadius = '12px';
                notice.style.fontSize = '14px';
                notice.style.color = '#78350f';
                // Build the notice safely using DOM APIs
                const strong = document.createElement('strong');
                strong.textContent = 'System Notice:';
                const link = document.createElement('a');
                link.href = '/';
                link.style.color = '#065f46';
                link.style.fontWeight = 'bold';
                link.style.textDecoration = 'underline';
                link.textContent = 'click here to return home';
                const textNode = document.createTextNode(' You are viewing an automated data archiver node. For the main interactive patient portal and consultation booking, please ');
                notice.appendChild(strong);
                notice.appendChild(textNode);
                notice.appendChild(link);
                notice.appendChild(document.createTextNode('.'));
                noticeContainer.appendChild(notice);
            }
        })();
    </script>
</body>
</html>
